<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!--bootstrap css-->
    <link href="./bootstrap.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet">
    <!--custom css-->
    <link href="stylesheet.css" rel="stylesheet">

</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container d-flex justify-content-between">

                <div class="logo d-flex align-items-center gap-2 justify-content-between ">
                    <div> <i class="fa-solid fa-address-book rounded-3"></i></div>
                    <div><a class="navbar-brand" href="#">Contact<span class="hub">Hub</span></a>
                        <p><b>Smart Contact Manager</b></p>
                    </div>
                </div>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav gap-3 align-items-center">
                        <li class="nav-item">
                            <button class="add" data-bs-toggle="modal" data-bs-target="#contactModal"> <a
                                    class="nav-link active" href="#">+ Add Contact</a>
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="bell"><a class="nav-link" href="#"><i class="fa-solid fa-bell"></i> </a>
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="gear"> <a class="nav-link" href="#"><i class="fa-solid fa-gear"></i> </a>
                            </button>
                        </li>
                        <li class="nav-item photo">
                            <img src="images/avatar-4.jpg" alt="profilePicture">
                        </li>
                    </ul>
                    <div class="modal fade" id="contactModal" tabindex="-1">

                        <div class="modal-dialog">
                            <div class="modal-content">

                                <div class="modal-header">
                                    <h5 class="modal-title">Add Contact</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>

                                <div class="modal-body">
                                    <form>
                                        <div class="profile-picture mb-3 d-flex flex-column align-items-center gap-2 mt-3">
                                            <div id="editProfilePic" class="image">
                                      <i class="fa-solid fa-user"></i></div>
                                            <input type="file" accept="image/*">
                                        
                                        </div>
                                        <label for="nameInput" class="form-label">Name<span>*</span></label>
                                        <input class="form-control mb-2" id="nameInput" required
                                            placeholder="Enter Full Name">
                                        <label for="phoneInput" class="form-label">Phone<span>*</span></label>
                                        <input class="form-control mb-2" id="phoneInput" required
                                            placeholder="e.g.,01234567890">
                                        <label for="emailInput" class="form-label">Email</label>
                                        <input class="form-control mb-2" id="emailInput" placeholder="name@example.com">
                                        <label for="addressInput" class="form-label">Address</label>
                                        <input class="form-control mb-2" id="addressInput" placeholder="Enter address">
                                        <label for="groupSelect" class="form-label mt-3">Group</label>
                                        <select class="form-control mb-2" id="groupSelect">
                                            <option value="">Select a group</option>
                                            <option value="family">Family</option>
                                            <option value="friends">Friends</option>
                                            <option value="work">Work</option>
                                            <option value="school">school</option>
                                            <option value="others">Others</option>
                                        </select>
                                        <label class="form-label mt-3">Note</label>
                                        <textarea class="form-control" id="noteInput" rows="3"></textarea>
                                        <div class="d-flex justify-content-center gap-5 flex-row mt-3">
                                            <div class="d-flex align-items-center justify-content-center gap-2">
                                                <input type="checkbox" id="favoriteCheckbox" class="form-check-input ">
                                                <label for="favoriteCheckbox" class="form-check-label mb-0"><i
                                                        class="fa-solid fa-star staro"></i> Add to Favorites</label>
                                            </div>
                                            <div class="d-flex align-items-center justify-content-center gap-2">
                                                <input type="checkbox" id="emergencyCheckbox" class="form-check-input ">
                                                <label for="emergencyCheckbox" class="form-check-label"><i
                                                        class="fa-solid fa-heart-pulse pulseo"></i> Mark as
                                                    Emergency</label>
                                            </div>
                                        </div>
                                        <div class="d-flex justify-content-center mt-4  gap-5">
                                            <button class="btn btn-primary" type="button" id="saveBtn">Save</button>
                                            <button class="btn btn-secondary" data-bs-dismiss="modal">cancel</button>
                                        </div>

                                    </form>
                                </div>

                            </div>
                        </div>

                    </div>

                </div>
            </div>
        </nav>
    </header>
    <main>
        <section id="menu">
            <div class="container">
                <div class="row mt-5">
                    <div class="col-12 col-md-6 col-lg-4 mb-2">
                        <div class="card">
                            <div class="card-body d-flex align-items-center gap-2">
                                <div class="user">
                                    <i class="fa-solid fa-users"></i>
                                </div>
                                <div>
                                    <h5 class="card-title">Total</h5>
                                    <span class="card-Text totalCounter">0</span>

                                </div>
                            </div>
                        </div>
                    </div>
                    <div class=" col-12 col-md-6 col-lg-4 mb-2">
                        <div class="card">
                            <div class="card-body d-flex align-items-center gap-2">
                                <div class="star"> <i class="fa-solid fa-star"></i></div>
                                <div>
                                    <h5 class="card-title">FAVORITES</h5>
                                    <span class="card-Text" id="favCounter">0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class=" col-12 col-md-6 col-lg-4 mb-2">
                        <div class="card">
                            <div class="card-body d-flex align-items-center gap-2">
                                <div class="heart"> <i class="fa-solid fa-heart-pulse"></i></div>
                                <div>
                                    <div>
                                        <h5 class="card-title">EMERGENCY</h5>
                                        <span class="card-Text" id="emergencyCounter">0</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
        </section>
        <section id="contact-form">
            <div class="container">
                <div class="row mt-5">
                    <div class="col-12 col-lg-8">
                        <h3>All Contacts</h3>
                        <p>Manage and organize your <b><span class="totalCounter">  0  </span> </b> contacts</p>
                        <div class="input-group position-relative">
                            <input class="form-control" type="text" id="search"
                                placeholder="search by name, email, or phone...">
                            <div class="glass"><i class="fa-solid fa-magnifying-glass"></i>
                            </div>

                        </div>
                        
                            <div class="empty-page">
                                <div
                                    class="d-flex flex-column align-items-center justify-content-center searchDetails gap-2">
                                    <i class="fa-solid fa-address-book book"></i>
                                    <h6>No contacts found.</h6>
                                    <p>Click "Add Contact" to get started</p>
                                </div>
                            </div>
                            <div id="contactList">
                            <div class="contact-card d-flex align-items-center justify-content-center"></div>
                        </div>
                    </div>
                    <div class="col-12 col-lg-4">
                        <div class="card  mb-3" >
                            <div class="card-header1 d-flex align-items-center gap-2">
                                <div class="star">
                                    <i class="fa-solid fa-star"></i>
                                </div>
                                <div>
                                    <h4>Favorites</h4>
                                    <span>Quick Access</span>
                                </div>
                            </div>
                            <div class="card-body">
                                <p class="card-text  py-3" id="favoritesContacts">No favorites yet.</p>
                            </div>
                        </div>
                        <div class="card mb-3">
                            <div class="card-header2 d-flex align-items-center gap-2">
                                <div class="heart">
                                    <i class="fa-solid fa-heart-pulse"></i>
                                </div>
                                <div>
                                    <h4>Emergency</h4>
                                    <span>Urgent contacts</span>
                                </div>
                            </div>
                            <div class="card-body">
                                <p class="card-text py-3"  id="emergencyContacts">No emergency contacts</p>
                            </div>
                        </div>
                    </div>

                </div>

        </section>


    </main>
    <script src="main.js"></script>
    <script src="./bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
